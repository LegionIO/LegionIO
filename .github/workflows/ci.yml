name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: LegionIO/.github/.github/workflows/ci.yml@main

  release:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: LegionIO/.github/.github/workflows/release.yml@main
    secrets:
      rubygems-api-key: ${{ secrets.RUBYGEMS_API_KEY }}

  trigger-homebrew:
    needs: release
    if: needs.release.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daemon build
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_DISPATCH_TOKEN }}
        run: |
          gh api repos/LegionIO/homebrew-tap/dispatches \
            -f event_type=build-daemon \
            -f "client_payload[legionio_version]=${{ needs.release.outputs.version }}"

  docker-build:
    name: Build Docker Image
    needs: release
    if: needs.release.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/legionio/legion:${{ needs.release.outputs.version }}
            ghcr.io/legionio/legion:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
